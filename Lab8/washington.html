<!DOCTYPE html>
<html>
<head>
    <title>Washington National Forests</title>
    <script src="https://d3js.org/d3.v5.min.js"></script>

    <style>
        body {
            position: absolute;
            font-family: Arial, sans-serif;
        }

        h1, h2 {
            position: absolute;
            background: white;
            left: 10px;
            padding: 5px;
        }

        h2 {
            top: 40px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>Washington National Forests</h1>
<h2></h2>

<script>

var width = 1000;
var height = 700;

var svg = d3.select("body")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

var albersProjection = d3.geoAlbers()
    .scale(4000)
    .rotate([120, 0])
    .center([0, 47.5])
    .translate([width / 2, height / 2]);

var geoPath = d3.geoPath()
    .projection(albersProjection);

// Load both files
Promise.all([
    d3.json("https://Landon1326.github.io/Washington.json"),
    d3.json("https://Landon1326.github.io/FS_National_Forests_Dataset_(US_Forest_Service_Proclaimed_Forests).geojson")
]).then(function(data) {

    var washington = data[0];
    var forests = data[1];

    // State Layer
    svg.append("g")
        .selectAll("path")
        .data(washington.features)
        .enter()
        .append("path")
        .attr("fill", "#dbeafe")
        .attr("stroke", "#333")
        .attr("d", geoPath)
        .on("mouseover", function() {
            d3.select("h2").text("Washington State");
        })
        .on("mouseout", function() {
            d3.select("h2").text("");
        });

    // Forest Layer
    svg.append("g")
        .selectAll("path")
        .data(forests.features)
        .enter()
        .append("path")
        .attr("fill", "green")
        .attr("opacity", 0.6)
        .attr("stroke", "#14532d")
        .attr("d", geoPath)
        .on("mouseover", function(d) {
            d3.select("h2").text(d.properties.FORESTNAME || "National Forest");
            d3.select(this).attr("fill", "yellow");
        })
        .on("mouseout", function() {
            d3.select("h2").text("");
            d3.select(this).attr("fill", "green");
        });

});

</script>

</body>
</html>
