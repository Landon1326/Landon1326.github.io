<!DOCTYPE html>
<html lang="en">
<head>
  ...
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
  
  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  <script>

    //create map
    var map = L.map('map',{
        center: [47.7511, -120.7401],
        zoom: 7
    });

    //base layer
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

    //layer variables
    let washingtonLayer;
    let forestLayer;
    let layerControl;

    //function to add toggle control once both layers load
    function updateLayerControl() {
    if (layerControl) return;

    if (washingtonLayer && forestLayer) {
        layerControl = L.control.layers(null, {
        "Washington Boundary": washingtonLayer,
        "National Forests": forestLayer
        }).addTo(map);
    }
}
    
 function getColor(rank) {
  rank = Number(rank);
  if (rank === 1) return "#2ecc71";   // green (low)
  if (rank === 5) return "#f1c40f";   // yellow (medium)
  if (rank === 10) return "#e74c3c";  // red (high)
  return "#95a5a6";                   // gray (no match / missing)
}

    //load Washington geoJSON
     fetch("https://Landon1326.github.io/Washington.json")
    .then(res => res.json())
    .then(data => {
      washingtonLayer = L.geoJSON(data, {
        style: function(feature) {
          const rank = feature.properties["WildfireSmokeRank"]
          
        },

            //  color coded style
      style: function(feature) {
        const score = feature.properties["CumulativeSmokeScore"];

        return {
          color: "black",        // border line
          weight: 1,
          fillColor: getColor(score),
          fillOpacity: 0.6
        };
      },

        //popup for tract #, score, and rank
        onEachFeature: function(feature, layer) {
          const props = feature.properties;

          const tract = props["CensusTract2020"] || "N/A";
          const smoke = props["CumulativeSmokeScore"] || "N/A";
          const rank = props["WildfireSmokeRank"] || "N/A";

          const popupContent = `
            <strong>Census Tract:</strong> ${tract}<br>
            <strong>Cumulative Smoke Score:</strong> ${smoke}<br>
            <strong>Rank:</strong> ${rank}
          `;

          layer.bindPopup(popupContent);
        }

      }).addTo(map);

      updateLayerControl();
    });

    //fetch forest geoJSON
    fetch("https://landon1326.github.io/FS_National_Forests_Dataset_(US_Forest_Service_Proclaimed_Forests).geojson")
  .then(res => res.json())
  .then(data => {
    forestLayer = L.geoJSON(data, {
      style: {
        color: "green",
        fillOpacity: 0.3
      },

      //popup for forest layer
      onEachFeature: function(feature, layer) {
        if (feature.properties && feature.properties.FORESTNAME) {
          layer.bindPopup(
            "<strong>Forest Name:</strong>" + feature.properties.FORESTNAME || "National Forest");
        }
      }
    }).addTo(map);

    updateLayerControl();
  });

  // Central Park, Washington (approx. location near Aberdeen)
const centralPark = [46.9720, -123.7035];

// 10 miles in meters
const radius = 10 * 1609.34;

const circle = L.circle(centralPark, {
  radius: radius,
  color: "red",
  fillColor: "#f03",
  fillOpacity: 0.2
}).addTo(map);

// add popup
circle.bindPopup(`
  <strong>Central Park, WA</strong><br>
  10-mile radius buffer zone | Area of best suitability
`);

circle.on("click", function () {
  this.openPopup();
});
  </script>
</body>
</html>
