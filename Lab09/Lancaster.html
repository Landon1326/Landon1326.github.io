<!DOCTYPE html>
<html>
<head>
    <title>Lancaster County Race Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }

        .legend {
            background: white;
            padding: 8px;
            line-height: 18px;
            color: #333;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Create map centered on Lancaster County
    var map = L.map('map').setView([40.82, -96.68], 10);

    // Add basemap
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

    // CHANGE THIS if your property name is different
    var raceField = "Bpercnt";

    // Color scale
    function getColor(d) {
        return d > 40 ? '#800026' :
               d > 30 ? '#BD0026' :
               d > 20 ? '#E31A1C' :
               d > 10 ? '#FC4E2A' :
               d > 5  ? '#FD8D3C' :
               d > 1  ? '#FEB24C' :
                        '#FFEDA0';
    }

    // Style function
    function style(feature) {
        return {
            fillColor: getColor(feature.properties[raceField] || 0),
            weight: 1,
            opacity: 1,
            color: 'black',
            fillOpacity: 0.7
        };
    }

    // Highlight feature on hover
    function highlightFeature(e) {
        var layer = e.target;

        layer.setStyle({
            weight: 3,
            color: '#666',
            fillOpacity: 0.9
        });

        layer.bringToFront();
    }

    // Reset style
    function resetHighlight(e) {
        geojson.resetStyle(e.target);
    }

    // Popup and interaction
    function onEachFeature(feature, layer) {
        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight
        });

        layer.bindPopup(
    "<b>Census Tract:</b> " + (feature.properties.NAME || "N/A") +
    "<br><br><b>Race Breakdown:</b>" +
    "<br>White: " + (feature.properties.Wpercnt || 0) + "%" +
    "<br>Black: " + (feature.properties.Bpercnt || 0) + "%" +
    "<br>Asian: " + (feature.properties.Apercnt || 0) + "%" +
    "<br>Hispanic: " + (feature.properties.Hpercnt || 0) + "%"
);
    }

    var geojson;

    // Fetch GeoJSON
    fetch('https://Landon1326.github.io/Lab09/Lancaster1.geojson')
        .then(res => res.json())
        .then(data => {
            console.log("GeoJSON loaded:", data);
            console.log("Properties:", data.features[0].properties);

            geojson = L.geoJson(data, {
                style: style,
                onEachFeature: onEachFeature
            }).addTo(map);

            map.fitBounds(geojson.getBounds());
        })
        .catch(err => console.error("Error loading GeoJSON:", err));

    // Legend
    var legend = L.control({position: 'bottomright'});

    legend.onAdd = function () {
        var div = L.DomUtil.create('div', 'legend'),
            grades = [0, 1, 5, 10, 20, 30, 40];

        for (var i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(grades[i] + 1) +
                '; width:18px; height:18px; display:inline-block;"></i> ' +
                grades[i] +
                (grades[i + 1] ? '&ndash;' + grades[i + 1] + '%<br>' : '+');
        }

        return div;
    };

    legend.addTo(map);
</script>

</body>
</html>
