<style> 
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { min-height: 100%;}
</style>
</head>

<body>
    <div id="map"></div>

    <script>
// Create Map
       var map = L.map('map', {
center: [38.1625228, -96.9633171],
zoom: 4
});

//Basemap
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
	maxZoom: 19,
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by <a href="https://www.hotosm.org/" target="_blank">Humanitarian OpenStreetMap Team</a> hosted by <a href="https://openstreetmap.fr/" target="_blank">OpenStreetMap France</a>'
}).addTo(map);

//Load GeoJSON
$.getJSON("https://Landon1326.github.io/Lab07/Lab7Data.geojson")
.done(function(data) {
var info = processData(data);
createPropSymbols(info.timestamps, data);
createSliderUI(info.timestamps);
});

//Process Data
function processData(data) {
    var timestamps = [];
    var min = Infinity;
    var max = -Infinity;

for (var feature in data.features) {
    var properties = data.features[feature].properties;

    for (var attribute in properties) {

      if (attribute != 'id' &&
          attribute != 'name' &&
          attribute != 'latitude' &&
          attribute != 'longitude') {

        if ($.inArray(attribute, timestamps) === -1) {
          timestamps.push(attribute);
        }

        if (properties[attribute] < min) {
          min = properties[attribute];
        }

        if (properties[attribute] > max) {
          max = properties[attribute];
        }
      }
    }
  }

  timestamps.sort();

  return {
    timestamps: timestamps,
    min: min,
    max: max
  };
}

//Create proportional symbols
function createPropSymbols(timestamps, data) {

  cities = L.geoJson(data, {

    pointToLayer: function(feature, latlng) {
      return L.circleMarker(latlng, {
        fillColor: "#501e65",
        color: "#501e65",
        weight: 2,
        fillOpacity: 0.5
      }).on({
        mouseover: function() {
          this.openPopup();
          this.setStyle({fillColor: 'green'});
        },
        mouseout: function() {
          this.closePopup();
          this.setStyle({fillColor: '#501e65'});
        }
      });
    }

  }).addTo(map);

  updatePropSymbols(timestamps[0]);
}

//Create Slider
function createSliderUI(timestamps) {

  var sliderControl = L.control({ position: 'bottomleft' });

  sliderControl.onAdd = function(map) {

    var slider = L.DomUtil.create("input", "range-slider");

    L.DomEvent.addListener(slider, 'mousedown', function(e) {
      L.DomEvent.stopPropagation(e);
    });

    var labels = ["1950","1960","1970","1980","1990","2000","2010","2020"];

    $(slider)
      .attr({
        type: 'range',
        min: timestamps[0],
        max: timestamps[timestamps.length - 1],
        step: 10,
        value: timestamps[0]
      })
      .on('input change', function() {

        updatePropSymbols($(this).val().toString());

        var i = $.inArray(this.value, timestamps);
        $(".temporal-legend").text(labels[i]);
      });

    return slider;
  };

  sliderControl.addTo(map);
  createTimeLabel(timestamps[0]);
}

//Time Label
function createTimeLabel(startTimestamp) {

  var temporalLegend = L.control({ position: 'bottomleft' });

  temporalLegend.onAdd = function(map) {
    var output = L.DomUtil.create("output", "temporal-legend");
    $(output).text(startTimestamp);
    return output;
  };

  temporalLegend.addTo(map);
}


//Update Symbols
function updatePropSymbols(timestamp) {

  cities.eachLayer(function(layer) {

    var props = layer.feature.properties;
    var radius = calcPropRadius(props[timestamp]);

    var popupContent = props.name + 
      " — " + timestamp + 
      " Population: " + props[timestamp];

    layer.setRadius(radius);
    layer.bindPopup(popupContent, {
      offset: new L.Point(0, -radius)
    });
  });
}

//Calcuate the radius of each proportional symbol
function calcPropRadius(attributeValue) {
    var scaleFactor = 0.001;
    var area = attributeValue * scaleFactor;
    return Math.sqrt(area/Math.PI);
}
    </script>
</body>
</html>
