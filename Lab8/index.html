<!DOCTYPE html>
<html>
<head>
    <title>Lab 8 | D3</title>
    <script src="https://d3js.org/d3.v5.min.js" charset="utf-8"></script>
   <script src="https://rshepard2.github.io/Lab9/data/lnkrds.js"></script>
    <script src="https://rshepard2.github.io/Lab9/data/northeast_lnk_blds.js"></script>

    <style>
        /* Base styles for the page and text elements [cite: 172, 176, 183] */
        body {
            position: absolute;
            font-family: "Proxima Nova", "Montserrat", sans-serif;
        }
        h1, h2 {
            position: absolute;
            background: white;
            left: 10px;
            font-size: 1.3em;
            font-weight: 100;
        }
        h2 {
            top: 30px;
            font-size: 1em;
        }
        /* Style for the building when the mouse hovers over it [cite: 187] */
        .hover {
            fill: yellow;
        }
    </style>
</head>
<body>
    <h1>Aging Northeast Lincoln Homes</h1>
    <h2></h2>

    <script>
        // Set basic dimensions for the SVG canvas [cite: 42, 43]
        var width = 1000;
        var height = 600;

        // Color ramp variables [cite: 225, 231, 232]
        var lowColor = '#bc2a66';
        var highColor = '#f9f9f9';
        var minVal = 1900;
        var maxVal = 2020;

        // Create a linear scale to determine colors based on year built [cite: 232]
        var ramp = d3.scaleLinear().domain([minVal, maxVal]).range([lowColor, highColor]);

        // Create the SVG element [cite: 45, 48]
        var svg = d3.select("body")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Group element to hold geometry [cite: 51]
        var g = svg.append("g");

        // Set up the Albers projection centered on NE Lincoln [cite: 60, 63, 64]
        var albersProjection = d3.geoAlbers()
            .scale(2850000)
            .rotate([96.6327, 0])
            .center([0, 40.8497493])
            .translate([width/2, height/2]);

        // Define the path generator [cite: 77, 78]
        var geoPath = d3.geoPath()
            .projection(albersProjection);

        // Draw the roads layer [cite: 112, 118]
        g.selectAll("path")
            .data(lnkrds.features)
            .enter()
            .append("path")
            .attr("fill", "#ccc")
            .attr("stroke", "#333")
            .attr("d", geoPath);

        // Draw the buildings layer with interactivity [cite: 137, 236]
        var lnk_json = svg.append("g");

        lnk_json.selectAll("path")
            .data(lnkbldngsjson.features)
            .enter()
            .append("path")
            // Apply the color ramp based on the RESYRBLT field [cite: 236]
            .attr("fill", function(d) { return ramp(d.properties.RESYRBLT) })
            .attr("stroke", "#999")
            .attr("d", geoPath)
            .attr("class", "buildingdata")
            // Mouseover event to show year and change color [cite: 205, 207, 208]
            .on("mouseover", function(d){
                d3.select("h2").text("Built in" + d.properties.RESYRBLT);
                d3.select(this).attr("class", "buildingdata hover");
            })
            // Mouseout event to clear text and reset color [cite: 210, 212]
            .on("mouseout", function(d){
                d3.select("h2").text("");
                d3.select(this).attr("class", "buildingdata");
            });

    </script>
</body>
</html>
</html>
