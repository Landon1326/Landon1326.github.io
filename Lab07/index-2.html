----------------------------------------------------------------------------<!DOCTYPE html>
<html>

<head>
<title>Lab 7 Part 2.2</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js" crossorigin=""></script>

<script src="https://dsps.lib.uiowa.edu/placing/public/leafletSlider-1.0.2/leaflet.SliderControl.min.js"></script>
<script src="https://dsps.lib.uiowa.edu/placing/public/fuse-1.2.1/fuse.min.js"></script>
<script src="https://dsps.lib.uiowa.edu/placing/public/leafletFuseSearch-noVersion/leafletfuse.js"></script>

<link rel="stylesheet" href="https://dsps.lib.uiowa.edu/placing/public/leafletFuseSearch-noVersion/leafletfuse.css"/>

<script src="http://code.jquery.com/jquery-1.9.1.min.js"></script>
<script src="http://code.jquery.com/ui/1.9.2/jquery-ui.js"></script>

<link rel="stylesheet" href="http://code.jquery.com/ui/1.9.2/themes/base/jquery-ui.css">

<script src="https://dsps.lib.uiowa.edu/placing/public/jqueryUiTouchPunch-0.2.2/jquery.ui.touch-punch.min.js"></script>

<style>
#map {
width: 100%;
height: 650px;
}
</style>

</head>

<body>

<div id="map"></div>

<script>


// Map center changed (example: Lincoln Nebraska)
var map = L.map('map', {
center: [40.8136, -96.7026],
zoom: 12,
layers: [basemap]
});

    // Basemap
var basemap = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
	maxZoom: 19,
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles style by <a href="https://www.hotosm.org/" target="_blank">Humanitarian OpenStreetMap Team</a> hosted by <a href="https://openstreetmap.fr/" target="_blank">OpenStreetMap France</a>'
}).addTo(map);

$.getJSON("https://landon1326.github.io/Lab07/brinton.geojson")
.done(function(data) {
});

// Popup for each feature
var onEachFeature = function(feature, layer) {

if (feature.properties) {

var prop = feature.properties;

var popup =
'<h3>' + prop['NAME'] + '</h3>' +
'<strong>Year:</strong> ' + prop['time'] +
'<br><strong>Location:</strong> ' + prop['location'];

feature.layer = layer;

layer.bindPopup(popup, {maxWidth: "auto"});
}
};

// Marker styles

var blueCircleMarkers = {
radius: 4,
fillColor: "#00AEEF",
color: "#3978BF",
weight: 1,
opacity: 0.8,
fillOpacity: 0.5
};

var orangeCircleMarkers = {
radius: 5,
fillColor: "#ED1C24",
color: "#ED1C24",
weight: 1,
opacity: 1,
fillOpacity: 0.7
};

var greenCircleMarkers = {
radius: 5,
fillColor: "#ffff00",
color: "#286933",
weight: 1,
opacity: 1,
fillOpacity: 0.7
};

// Normal layer
var firstlayer = L.geoJson(omaJson, {
onEachFeature: onEachFeature,
pointToLayer: function(feature, latlng) {
return L.circleMarker(latlng, blueCircleMarkers);
}

}).addTo(map);

// Timeline layer (for slider)

var timelineLayer = L.geoJson(omaJson, {
onEachFeature: onEachFeature,
pointToLayer: function(feature, latlng) {
return L.circleMarker(latlng, orangeCircleMarkers);
}

});

// Search layer

var searchLayer = L.geoJson(omaJson, {
onEachFeature: onEachFeature,
pointToLayer: function(feature, latlng) {
return L.circleMarker(latlng, greenCircleMarkers);
}

});

// Slider control

var sliderControl = L.control.sliderControl({
position: "topright",
layer: timelineLayer,
range: true
});

map.addControl(sliderControl);
sliderControl.startSlider();

// Search tool

var searchOptions = {
position: 'topleft',
title: 'Search',
placeholder: 'Search by name',
maxResultLength: 10,
caseSensitive: false,
showInvisibleFeatures: true,
layerToToggle: searchLayer,
threshold: 0.5,
showResultFct: function(feature, container) {
props = feature.properties;
var name = L.DomUtil.create('b', null, container);
name.innerHTML = props.NAME;
container.appendChild(L.DomUtil.create('br', null, container));
var info = props.NAME;
container.appendChild(document.createTextNode(info));

}
};

var searchControl = L.control.fuseSearch(searchOptions);
map.addControl(searchControl);
searchControl.indexFeatures(myData, ['NAME']);

// Display features

displayFeatures(myData, searchLayer);

function displayFeatures(features, layer) {
for (var id in features) {
var feat = features[id];
var site = L.geoJson(feat, {
pointToLayer: function(feature, latLng) {

var marker = L.marker(latLng, {
keyboard: false,
riseOnHover: true
});

return marker;
},
onEachFeature: onEachFeature
});
if (layer !== undefined) {
layer.addLayer(site);
}
}
return layer;
}

// Layer control

var overlays = {
"Dataset Points": firstlayer
};

var baseMaps = {
"Basemap": basemap
};

L.control.layers(overlays, baseMaps, {collapsed:false}).addTo(map);

</script>

</body>
</html>
